<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Brand — Success</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header" role="banner">
        <div class="header-left">
            <a href="index.html" aria-label="Home">
                <img class="icon-home" src="assets/icon-home.svg" alt="Home">
            </a>
            <a href="index.html">
                <img class="brand-logo" src="assets/logo-brand.svg" alt="Brand Logo">
            </a>
        </div>
        <div class="header-right">
            <div class="social-icons">
                <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Social Link 1">
                    <img src="assets/icon-social-1.svg" alt="Social">
                </a>
                <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Social Link 2">
                    <img src="assets/icon-social-2.svg" alt="Social">
                </a>
            </div>
        </div>
    </header>

    <div class="submit-page">
        <div class="submit-form" style="text-align: center;">
            <h2>submission received!</h2>
            <div class="form-message form-message--success">
                thank you! your entry has been received and will be reviewed shortly.
            </div>
            <a href="index.html" class="submit-btn"
                style="display:inline-block; margin-top: 32px; text-decoration: none;">back
                to home</a>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer" role="contentinfo">
        <div class="footer-left">
            <span>&copy; 2026 Your Brand</span>
        </div>
        <div class="footer-right">
            <a href="#">Terms and Policies</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
