<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Brand — Landing</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header" role="banner">
        <div class="header-left">
            <a href="index.html" aria-label="Home">
                <img class="icon-home" src="assets/icon-home.svg" alt="Home">
            </a>
            <a href="index.html">
                <img class="brand-logo" src="assets/logo-brand.svg" alt="Brand Logo">
            </a>
        </div>
        <div class="header-right">
            <div class="social-icons">
                <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Social Link 1">
                    <img src="assets/icon-social-1.svg" alt="Social">
                </a>
                <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Social Link 2">
                    <img src="assets/icon-social-2.svg" alt="Social">
                </a>
            </div>
        </div>
    </header>

    <div class="landing-page" id="landing-page">
        <main class="landing-main" role="main">
            <!-- Hero: Center Content -->
            <div class="hero-center">
                <img class="hero-ornament" src="assets/ornament-hanging.svg" alt="Ornament" loading="lazy">
                <img class="hero-logo" src="assets/logo-hero.svg" alt="Hero Logo">
            </div>

            <!-- Hand-drawn illustrations in corners -->
            <div class="illustration-left">
                <img src="assets/illustration-left.svg" alt="Illustration" loading="lazy">
            </div>
            <div class="illustration-right">
                <img src="assets/illustration-right.svg" alt="About" loading="lazy">
            </div>

            <!-- Diary Button (Bottom Center) -->
            <div class="diary-btn-wrap">
                <a class="diary-btn" href="diary.html">
                    diary
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </a>
            </div>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer" role="contentinfo">
        <div class="footer-left">
            <span>&copy; 2026 Your Brand</span>
        </div>
        <div class="footer-right">
            <a href="#">Terms and Policies</a>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
