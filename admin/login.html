<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #e8e0d5;
            --accent2: #c8bfb5;
            --text: #f0ece8;
            --muted: #888;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient BG */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(232, 224, 213, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo h1 {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .logo p {
            font-size: 0.82rem;
            color: var(--muted);
            text-align: center;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            letter-spacing: -0.01em;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--muted);
            font-size: 0.78rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .info {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            font-size: 0.8rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .info strong {
            color: var(--accent2);
        }

        .status {
            margin-top: 16px;
            font-size: 0.82rem;
            color: var(--muted);
            text-align: center;
            min-height: 20px;
        }

        .status.error {
            color: #ff6b6b;
        }

        .status.success {
            color: #69db7c;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <h1>Admin Access</h1>
            <p>Sign in with your Netlify Identity credentials<br>to access the dashboard.</p>
        </div>

        <button class="login-btn" id="loginBtn" onclick="openLogin()">Sign In with Netlify Identity</button>

        <div class="divider">secured by netlify identity</div>

        <div class="info">
            <strong>First time?</strong> Accept your invite email, then return here to log in. Contact your site admin
            if you need access.
        </div>

        <p class="status" id="status"></p>
    </div>

    <script>
        const status = document.getElementById('status');

        // Check if already logged in
        if (window.netlifyIdentity) {
            netlifyIdentity.on('init', user => {
                if (user) {
                    status.textContent = 'Already signed in. Redirecting…';
                    status.className = 'status success';
                    setTimeout(() => { window.location.href = '/admin/'; }, 800);
                }
            });

            netlifyIdentity.on('login', user => {
                status.textContent = 'Signed in! Redirecting to dashboard…';
                status.className = 'status success';
                netlifyIdentity.close();
                setTimeout(() => { window.location.href = '/admin/'; }, 1000);
            });

            netlifyIdentity.on('error', err => {
                status.textContent = 'Error: ' + err.message;
                status.className = 'status error';
            });

            netlifyIdentity.init();
        }

        function openLogin() {
            if (window.netlifyIdentity) {
                netlifyIdentity.open('login');
            } else {
                status.textContent = 'Identity widget not loaded. Check your Netlify Identity setup.';
                status.className = 'status error';
            }
        }
    </script>
</body>

</html>
