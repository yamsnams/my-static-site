<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f0ece8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 18px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #e8e0d5, #c8bfb5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0a0a0a;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        p {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
            font-family: monospace;
        }

        input:focus {
            border-color: #e8e0d5;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #e8e0d5;
            color: #0a0a0a;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">✦</div>
        <h1>Admin Dashboard</h1>
        <p>Enter your GitHub Personal Access Token to unlock the dashboard. This token acts as your master access key.
        </p>

        <div class="form-group">
            <label>Master Token</label>
            <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" autofocus>
        </div>

        <button id="login-btn" onclick="login()">
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">Authenticate</span>
        </button>
        <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
        // If already logged in, redirect immediately
        if (localStorage.getItem('gh_token')) {
            window.location.replace('/admin/index.html');
        }

        // Allow pressing Enter to submit
        document.getElementById('gh-token').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        async function login() {
            const token = document.getElementById('gh-token').value.trim();
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');
            const errorMsg = document.getElementById('error-msg');

            if (!token) {
                errorMsg.textContent = 'Please enter a valid GitHub token.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                errorMsg.style.display = 'none';
                btn.disabled = true;
                spinner.style.display = 'block';
                btnText.textContent = 'Verifying...';

                // Verify token with GitHub API
                const res = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (res.ok) {
                    // Success: Store token and redirect
                    localStorage.setItem('gh_token', token);
                    window.location.href = '/admin/index.html';
                } else {
                    throw new Error('Invalid token or unauthorized.');
                }

            } catch (err) {
                console.error(err);
                errorMsg.textContent = 'Invalid token. Please check and try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Authenticate';
            }
        }
    </script>
</body>

</html>
